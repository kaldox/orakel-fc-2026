# ORAKEL FC 2026 - nginx Reverse-Proxy
# -------------------------------------
# 1. <orakel.deine-domain.tld> durch deine echte (Sub-)Domain ersetzen.
# 2. Datei nach /etc/nginx/sites-available/orakel-fc kopieren.
# 3. Aktivieren:  sudo ln -s /etc/nginx/sites-available/orakel-fc /etc/nginx/sites-enabled/
# 4. Test + Reload:  sudo nginx -t && sudo systemctl reload nginx
# 5. HTTPS holen:  sudo certbot --nginx -d orakel.deine-domain.tld
#    (certbot ergaenzt den 443-Block und die Zertifikate automatisch.)

server {
    listen 80;
    listen [::]:80;
    server_name orakel.deine-domain.tld;

    # Maximale Upload-Groesse (klein halten - hier wird nichts hochgeladen).
    client_max_body_size 2m;

    location / {
        proxy_pass http://127.0.0.1:8090;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Schadet nicht und macht die Sache zukunftssicher.
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout 60s;
    }
}
